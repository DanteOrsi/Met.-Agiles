name: Integracion Continua Calculadora

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      # Actualizado a v4 para borrar el warning amarillo
      uses: actions/checkout@v4 

    - name: Configurar Python
      # Actualizado a v5 para borrar el warning amarillo
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias de calidad
      run: |
        python -m pip install --upgrade pip
        pip install coverage pylint

    - name: Ejecutar Análisis Estático (Pylint)
      run: |
        # Agregamos --disable=C,R para ignorar las "Convenciones" y "Refactors"
        pylint calculadora.py test_calculadora.py --disable=C,R --fail-under=7.0

    - name: Ejecutar Unit Tests con Cobertura
      run: |
        coverage run -m unittest test_calculadora.py

- name: Mostrar reporte de Code Coverage visual
      run: |
        # Esto imprime en la consola para el log
        coverage report -m
        # Esto genera una tabla visual y hermosa en el dashboard del Action
        coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
